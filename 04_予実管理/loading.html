<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }
    
    .container {
      text-align: center;
      padding: 2rem;
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.3);
      max-width: 90%;
      width: 320px;
    }

    .spinner-box {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .spinner {
      box-sizing: border-box;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-top-color: #38bdf8;
      border-bottom-color: #38bdf8;
      border-radius: 50%;
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    .spinner-inner {
      box-sizing: border-box;
      position: absolute;
      width: 80%;
      height: 80%;
      border: 3px solid transparent;
      border-left-color: #ec4899;
      border-right-color: #ec4899;
      border-radius: 50%;
      animation: spin-reverse 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #f8fafc;
      letter-spacing: 0.05em;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #38bdf8;
      font-weight: 400;
      margin-bottom: 1rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-text {
      font-size: 0.8rem;
      color: #94a3b8;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes spin-reverse {
      0% { transform: rotate(360deg); }
      100% { transform: rotate(0deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner-box">
      <div class="spinner"></div>
      <div class="spinner-inner"></div>
    </div>
    <div class="title">データ読み込み中</div>
    <div class="subtitle" id="facility-name"><?= facilityName ?></div>
    <div class="status-text" id="status">通信を開始しています...</div>
  </div>

  <script>
    window.onload = function() {
      var facilityName = document.getElementById('facility-name').innerText;
      document.getElementById('status').innerText = 'データソースを読み込んでいます...';
      
      google.script.run
        .withSuccessHandler(onSuccess)
        .withFailureHandler(onFailure)
        .runImport(facilityName);
    };

    function onSuccess() {
      document.getElementById('status').innerText = '完了しました！';
      setTimeout(function() {
        google.script.host.close();
      }, 500);
    }

    function onFailure(error) {
      alert("エラーが発生しました:\n" + error.message);
      google.script.host.close();
    }
  </script>
</body>
</html>
